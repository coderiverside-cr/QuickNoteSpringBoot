spring.application.name=quicknote

# Identificador para saber que usas Postgres (opcional, útil para lógicas de la app)
database=postgresql

# Configuración central de Cloud SQL (El Starter se encarga del URL)
spring.cloud.gcp.sql.enabled=true
spring.cloud.gcp.sql.database-name=db
spring.cloud.gcp.sql.instance-connection-name=quick-note-api:southamerica-east1:quicknote

# Fallback for local development (when INSTANCE_CONNECTION_NAME is not set)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db}

# Credenciales del usuario que creamos en los pasos anteriores
spring.datasource.username=quicknote_user
spring.datasource.password=SecretPassword

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000

# Configuración JPA / Hibernate adaptada para Postgres en Cloud SQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false

# Configuración del servidor
server.port=${PORT:8080}


