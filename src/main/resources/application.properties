spring.application.name=quicknote

spring.datasource.url=jdbc:postgresql://localhost:5432/db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=public

spring.jpa.open-in-view=false

# App Info (Record)

app.info.name=QuickNote App
app.info.description=A simple note-taking application
app.info.version=1.0.0

# Feature Flags (Map)
app.features.flags.beta-mode.enabled=true
app.features.flags.beta-mode.description=Enable beta features for early access users
app.features.flags.dark-theme.enabled=false
app.features.flags.dark-theme.description=Enable dark mode UI
app.features.flags.export-enabled.enabled=true
app.features.flags.export-enabled.description=Allow exporting notes to PDF

# Whitelist (List of objects)
app.lists.items[0].name=LocalNetwork
app.lists.items[0].priority=1
app.lists.items[1].name=TrustedPartner
app.lists.items[1].priority=5
app.lists.items[2].name=AdminSubnet
app.lists.items[2].priority=10

# Welcome Message (@Value)
app.welcome-message=Welcome to QuickNote! Enjoy your stay.
