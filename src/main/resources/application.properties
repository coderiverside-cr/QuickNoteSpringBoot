spring.application.name=quicknote

# application.properties
server.port=${PORT:8080}

# Database Configuration (via environment variables)
# For Cloud Run with Cloud SQL Proxy
spring.cloud.gcp.sql.instance-connection-name=${INSTANCE_CONNECTION_NAME:}
spring.cloud.gcp.sql.database-name=${DB_NAME:db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Fallback for local development (when INSTANCE_CONNECTION_NAME is not set)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db}

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=public

spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.com.coderiverside=DEBUG